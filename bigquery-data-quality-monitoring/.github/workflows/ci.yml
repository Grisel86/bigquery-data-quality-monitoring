name: CI — Quality Checks & dbt Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run the full quality suite daily at 06:00 UTC
    - cron: "0 6 * * *"

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  PYTHONPATH: src

jobs:
  # ── 1. Unit tests (no GCP credentials needed) ──────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ \
            --verbose \
            --tb=short \
            --cov=src/quality \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── 2. dbt compile check (validates SQL syntax, no BQ connection needed) ───
  dbt-compile:
    name: dbt compile
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.7.9

      - name: Write dbt profiles (mock — compile only)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          chicago_crime_dq:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: mock-project-for-compile
                dataset: mock_dataset
                location: US
                threads: 1
                timeout_seconds: 60
                keyfile_json: '{"type":"service_account","project_id":"mock"}'
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        run: dbt compile --profiles-dir ~/.dbt
        # compile validates SQL syntax without running queries

  # ── 3. Full quality pipeline (runs on push to main with GCP creds) ─────────
  quality-pipeline:
    name: Full quality pipeline
    runs-on: ubuntu-latest
    needs: [unit-tests, dbt-compile]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Python quality checks
        run: |
          python src/runner.py \
            --project ${{ secrets.GCP_PROJECT }} \
            --log-dataset chicago_crime_dq

      - name: Write dbt profiles (real GCP)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          chicago_crime_dq:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT }}
                dataset: chicago_crime_dq_ci
                location: US
                threads: 2
                timeout_seconds: 300
                keyfile_json: '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}'
          EOF

      - name: dbt run + test
        working-directory: dbt
        run: |
          dbt deps
          dbt run  --profiles-dir ~/.dbt --target ci
          dbt test --profiles-dir ~/.dbt --target ci
