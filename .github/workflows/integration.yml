jobs:
  check-secrets:
    name: Check if BigQuery secrets are configured
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        run: |
          if [[ -n "${{ secrets.GCP_SA_KEY }}" && -n "${{ secrets.GCP_PROJECT_ID }}" ]]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::BigQuery secrets not configured — skipping integration tests"
          fi

  integration:
    name: BigQuery integration tests
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: integration

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run integration tests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_TEST_DATASET }}
          BIGQUERY_LOCATION: US
        run: pytest tests/integration -m "integration" -v --no-cov

      - name: Cleanup test artifacts
        if: always()
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_TEST_DATASET }}
        run: |
          python -c "from tests.integration.cleanup import purge_test_data; purge_test_data()" || true