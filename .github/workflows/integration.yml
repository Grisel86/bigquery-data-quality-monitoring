name: Integration Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/integration/**"
      - "requirements*.txt"
  workflow_dispatch:  # Allow manual triggering

# Don't run integration in parallel for the same branch — they share BigQuery resources
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: BigQuery integration tests
    runs-on: ubuntu-latest
    # Skip on Dependabot PRs (they don't have secrets access)
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 20
    environment: integration  # Use GitHub Environments for secret scoping

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run integration tests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_TEST_DATASET }}
          BIGQUERY_LOCATION: US
        run: pytest tests/integration -m "integration" -v --no-cov

      - name: Cleanup test artifacts
        if: always()
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_TEST_DATASET }}
        run: |
          python -c "from tests.integration.cleanup import purge_test_data; purge_test_data()" || true
