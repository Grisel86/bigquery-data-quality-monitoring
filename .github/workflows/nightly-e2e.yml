name: Nightly E2E

on:
  schedule:
    # Every day at 02:00 UTC (23:00 in Argentina, before workday starts)
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  e2e:
    name: End-to-end smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run E2E tests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_TEST_DATASET }}
        run: pytest tests -m "e2e" -v --no-cov --junit-xml=e2e-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.xml
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 Nightly E2E failed on `${{ github.repository }}`. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
